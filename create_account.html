<!DOCTYPE html>
<html>

<head>
    <title>create account</title>
    <style>
        body {
            background-image: url("web image/image_three.jpg");
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
        }

        h1 {
            text-align: center;
            font-size: 75px;
        }

        h3 {
            text-emphasis: 21;
            text-align: center;
            text-shadow: 0cqw;
        }

        form {
            text-align: center;
        }
    </style>
</head>

<body>
    <h1>HENGO FAMILY</h1>
    <h3 style="text-align: center;">CREATE ACCOUNT</h3>

    <form style="">
        <!--First names-->
        <label for="first_name" form="user_first_name">First Name:</label>
        <input id="first_name" name="user_first_name" type="text" required placeholder="Enter first name"><br><br>

        <!--Second names-->
        <label for="last_name" form="User_last_name">Last Name:</label>
        <input id="last_name" name="User_last_name" required placeholder="Enter Last name" type="text"><br><br>

        <!--Phone number-->
        <label for="phone_number" form="user_phone_number">Phone Number:</label>
        <input id="phone_number" name="user_phone_number" required type="number"
            placeholder="Example +255762300713"><br><br>

        <!--Email address-->
        <label for="email_address" form="user_email_address">Email:</label>
        <input id="email_address" type="email" placeholder="Enter Email" required name="user_email_address"><br><br>

        <!--Submit part-->
        <input type="submit" value="Back">
        <input type="submit" value="submit"><br>

    </form>
</body>

</html>
